name: SmartRecipeGenerator Python CI

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python Syntax
        run: |
          python -m py_compile db_connect.py
          python -m py_compile sourcecode1.py
          python -m py_compile streamlit_code.py

      - name: Create staging folder
        run: |
          mkdir staging
          cp *.py requirements.txt staging

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: smart-recipe-project
          path: staging

      - name: Run Simple Test
        run: |
          python -c "print('Workflow executed successfully ✅')"
